<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>

    <!-- Tailwind + DaisyUI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">

    <title>AmbaNime | NEO-MANGA</title>

    <style>
        :root {
            --primary: #ffde00;
            --secondary: #ff4e00;
            --black: #000000;
            --white: #ffffff;
        }

        * {
            font-family: "Inter", sans-serif;
        }

        h1, h2, h3, .font-syne {
            font-family: "Syne", sans-serif;
            text-transform: uppercase;
        }

        body {
            background: var(--white);
            color: var(--black);
            overflow-x: hidden;
        }

        .brutalist-card {
            background: var(--white);
            border: 4px solid var(--black);
            box-shadow: 8px 8px 0px 0px var(--black);
            transition: all 0.2s ease;
        }

        .brutalist-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px 0px var(--black);
        }

        .brutalist-btn {
            background: var(--primary);
            border: 3px solid var(--black);
            box-shadow: 4px 4px 0px 0px var(--black);
            color: var(--black);
            font-weight: 800;
            transition: all 0.1s active;
        }

        .brutalist-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px var(--black);
        }

        .manga-grid {
            background-image: radial-gradient(var(--black) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.1;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .text-stroke {
            -webkit-text-stroke: 2px var(--black);
            color: transparent;
        }

        .hero-overlay-custom {
            background: linear-gradient(45deg, var(--primary) 0%, transparent 70%);
        }

        .detailModal {
            display: none;
        }

        .detailModal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            padding: 20px;
            overflow-y: auto; /* Ensure the modal backdrop itself can handle overflow if needed */
        }

        /* Prevent body scroll when modal is active */
        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-white">
    <div class="manga-grid"></div>

    <!-- NAVBAR -->
    <header class="sticky top-0 z-50 bg-white border-b-4 border-black">
        <nav class="navbar container mx-auto px-4 py-4">

            <div class="flex-1">
                <a class="text-4xl font-black italic tracking-tighter bg-black text-white px-4 py-1 rotate-1 inline-block">
                    AMBA<span class="text-[#ffde00]">NIME</span>
                </a>
            </div>

            <div class="flex gap-6 font-bold uppercase">
                <a class="hover:underline decoration-4 underline-offset-8">Home</a>
                <a href="#topAnime" class="hover:underline decoration-4 underline-offset-8">Top Anime</a>
                <a class="hover:underline decoration-4 underline-offset-8">Popular</a>
                <button class="brutalist-btn px-6 py-2">
                    LOGIN
                </button>
            </div>

        </nav>
    </header>

    <main>

        <!-- HERO -->
        <section class="relative h-auto md:h-[600px] border-b-4 border-black bg-black overflow-hidden">
        
            <div class="carousel w-full h-full" id="heroSlider">
        
                <!-- SLIDE-->
        
            </div>
        
        </section>
        
        <!-- Top Anime -->
        <section class="container mx-auto px-4 py-20" id="topAnime">
        
            <div class="flex flex-col md:flex-row items-start md:items-end justify-between mb-16 gap-6">
        
                <div class="relative">
                    <h2 class="text-6xl md:text-8xl font-black italic -ml-1">
                        TOP <span class="text-stroke">ANIME</span>
                    </h2>
                    <div class="bg-primary h-4 w-full absolute bottom-2 -z-10 -rotate-1"></div>
                    <p class="text-xl font-bold mt-4 uppercase tracking-widest">
                        // THE BEST OF THE SEASON
                    </p>
                </div>
        
                <button class="brutalist-btn px-10 py-4 text-xl">
                    VIEW ALL
                </button>
        
            </div>
        
            <!-- SEARCH -->
            <div class="mb-16">
                <div class="relative max-w-2xl">
                    <input id="searchAnime" type="text" 
                           class="w-full bg-white border-4 border-black p-6 text-2xl font-bold focus:outline-none focus:bg-primary shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]" 
                           placeholder="FIND YOUR ANIME..." />
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 text-3xl">🔍</span>
                </div>
            </div>
        
            <!-- CARD GRID -->
            <div id="animeContainer" class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12">
        
                <!-- CARD -->
        
            </div>

            <div id="detailContainer" class="detailModal"></div>
        
        </section>

        <section class="container mx-auto px-4 py-20 bg-black text-white -rotate-1" id="recomendation">
            <div class="rotate-1">
                <div class="flex flex-col md:flex-row items-start md:items-end justify-between mb-16 gap-6">
                
                    <div>
                        <h2 class="text-6xl font-black italic mb-2 text-primary">
                            RECOMMENDED
                        </h2>
                        <p class="text-xl font-bold uppercase tracking-widest text-white/70">
                            // HANDPICKED FOR YOU
                        </p>
                    </div>
                
                    <button class="brutalist-btn bg-white px-10 py-4 text-xl">
                        EXPLORE
                    </button>
                
                </div>
                <div id="recomendationContainer" class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12">

                </div>
            </div>
        </section>

    </main>

   

    <!-- FOOTER -->
    <footer class="bg-white border-t-4 border-black py-20">

        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-10">

            <div>
                <h2 class="text-5xl font-black italic tracking-tighter bg-black text-white px-6 py-2 -rotate-2 inline-block">
                    AMBANIME
                </h2>

                <p class="font-bold mt-6 text-xl" id="year">
                    <!-- year -->
                </p>
            </div>

            <div class="flex gap-6">
                <button class="brutalist-btn w-16 h-16 flex items-center justify-center text-2xl">FB</button>
                <button class="brutalist-btn w-16 h-16 flex items-center justify-center text-2xl">TW</button>
                <button class="brutalist-btn w-16 h-16 flex items-center justify-center text-2xl">IG</button>
            </div>

        </div>

    </footer>

    <!-- JQUERY -->
    <script src="script.js"></script>

</body>

</html>
